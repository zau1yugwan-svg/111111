<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 18px;
        color: var(--figma-color-text);
        background: var(--figma-color-bg);
        font-size: 12px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 16px;
        font-weight: 700;
      }

      p {
        margin: 0 0 16px;
        color: var(--figma-color-text-secondary);
        line-height: 1.6;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 600;
      }

      input[type="text"],
      input[type="password"],
      select {
        width: 100%;
        height: 34px;
        box-sizing: border-box;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        padding: 0 10px;
        color: var(--figma-color-text);
        background: var(--figma-color-bg-secondary);
        outline: none;
      }

      input[type="file"] {
        width: 100%;
        box-sizing: border-box;
        color: var(--figma-color-text-secondary);
      }

      input:focus {
        border-color: var(--figma-color-border-brand-strong);
      }

      .check {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        margin: 12px 0;
        color: var(--figma-color-text);
        font-weight: 500;
      }

      .check input {
        margin-top: 2px;
      }

      .hint {
        margin-top: 6px;
        color: var(--figma-color-text-tertiary);
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
      }

      .actions .primary {
        flex: 1;
      }

      button {
        height: 36px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        color: var(--figma-color-text-onbrand);
        background: var(--figma-color-bg-brand);
      }

      .secondary {
        color: var(--figma-color-text);
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
      }

      .status {
        min-height: 18px;
        margin-top: 12px;
        color: var(--figma-color-text-secondary);
        white-space: pre-wrap;
      }

      .selection-panel {
        margin: 14px 0;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        background: var(--figma-color-bg-secondary);
        overflow: hidden;
      }

      .selection-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px;
        border-bottom: 1px solid var(--figma-color-border);
        font-weight: 700;
      }

      .selection-count {
        flex: 0 0 auto;
        color: var(--figma-color-text-secondary);
        font-weight: 600;
      }

      .selection-list {
        max-height: 118px;
        overflow: auto;
      }

      .selection-empty,
      .selection-item {
        padding: 9px 10px;
        border-bottom: 1px solid var(--figma-color-border);
      }

      .selection-empty {
        color: var(--figma-color-text-tertiary);
      }

      .selection-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .selection-item:last-child {
        border-bottom: 0;
      }

      .selection-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 600;
      }

      .selection-type {
        flex: 0 0 auto;
        color: var(--figma-color-text-tertiary);
        font-size: 11px;
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      details {
        margin-top: 12px;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        padding: 10px;
        background: var(--figma-color-bg-secondary);
      }

      summary {
        cursor: pointer;
        font-weight: 700;
      }

      .translation-settings {
        margin-top: 14px;
      }

      .settings-section {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--figma-color-border);
        border-radius: 6px;
        background: var(--figma-color-bg);
      }

      .settings-section:first-of-type {
        margin-top: 10px;
      }

      .section-title {
        margin: 0 0 10px;
        font-weight: 800;
      }

      .inline-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }

      .inline-actions button {
        width: 100%;
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
      }

      .sub-settings {
        margin-top: 10px;
        border: 0;
        padding: 0;
        background: transparent;
      }

      .sub-settings summary {
        color: var(--figma-color-text-secondary);
        font-weight: 700;
      }

      .table-summary {
        margin-top: 8px;
        color: var(--figma-color-text-secondary);
        line-height: 1.5;
      }

      .language-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .language-pill {
        max-width: 100%;
        box-sizing: border-box;
        padding: 4px 8px;
        border: 1px solid var(--figma-color-border);
        border-radius: 999px;
        color: var(--figma-color-text);
        background: var(--figma-color-bg-secondary);
        font-size: 11px;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .language-pill.muted {
        color: var(--figma-color-text-tertiary);
        font-weight: 600;
      }

      ol {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--figma-color-text-secondary);
        line-height: 1.55;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
      }

      .field {
        display: none;
      }

      .field.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>中文转阿语 RTL</h1>
    <p>可选中画板或画板内任意元素后批量运行。插件会镜像布局位置，但不会把节点本身反向拉伸。</p>

    <div class="selection-panel">
      <div class="selection-head">
        <span>当前选中的画板 / 元素</span>
        <span id="selectionCount" class="selection-count">0 个</span>
      </div>
      <div id="selectionList" class="selection-list">
        <div class="selection-empty">还没有选中可转换画板或元素</div>
      </div>
    </div>

    <label class="check">
      <input id="createCopy" type="checkbox" checked>
      <span>生成副本，保留原中文画板</span>
    </label>

    <label class="check">
      <input id="translate" type="checkbox" checked>
      <span>把中文文本翻译成目标语言</span>
    </label>

    <label for="targetLanguage">目标语言</label>
    <select id="targetLanguage">
      <option value="ar">阿拉伯语 Arabic</option>
      <option value="en">英语 English</option>
      <option value="pt">葡萄牙语 Portuguese</option>
      <option value="es">西班牙语 Spanish</option>
      <option value="my">缅甸语 Burmese</option>
      <option value="ja">日语 Japanese</option>
      <option value="ko">韩语 Korean</option>
      <option value="fr">法语 French</option>
      <option value="de">德语 German</option>
      <option value="it">意大利语 Italian</option>
      <option value="ru">俄语 Russian</option>
      <option value="tr">土耳其语 Turkish</option>
      <option value="th">泰语 Thai</option>
      <option value="vi">越南语 Vietnamese</option>
      <option value="id">印尼语 Indonesian</option>
      <option value="ms">马来语 Malay</option>
      <option value="hi">印地语 Hindi</option>
      <option value="bn">孟加拉语 Bengali</option>
      <option value="ur">乌尔都语 Urdu</option>
      <option value="fa">波斯语 Persian</option>
      <option value="he">希伯来语 Hebrew</option>
      <option value="nl">荷兰语 Dutch</option>
      <option value="pl">波兰语 Polish</option>
      <option value="uk">乌克兰语 Ukrainian</option>
      <option value="ro">罗马尼亚语 Romanian</option>
      <option value="cs">捷克语 Czech</option>
      <option value="el">希腊语 Greek</option>
      <option value="sv">瑞典语 Swedish</option>
      <option value="da">丹麦语 Danish</option>
      <option value="fi">芬兰语 Finnish</option>
      <option value="no">挪威语 Norwegian</option>
      <option value="hu">匈牙利语 Hungarian</option>
      <option value="bg">保加利亚语 Bulgarian</option>
      <option value="hr">克罗地亚语 Croatian</option>
      <option value="sk">斯洛伐克语 Slovak</option>
      <option value="sl">斯洛文尼亚语 Slovenian</option>
      <option value="lt">立陶宛语 Lithuanian</option>
      <option value="lv">拉脱维亚语 Latvian</option>
      <option value="et">爱沙尼亚语 Estonian</option>
      <option value="sw">斯瓦希里语 Swahili</option>
      <option value="tl">菲律宾语 Filipino</option>
      <option value="custom">自定义语言代码</option>
    </select>
    <div id="customLanguageField" class="field">
      <label for="customTargetLanguage">自定义目标语言代码</label>
      <input id="customTargetLanguage" type="text" placeholder="例如：km、lo、ta、te">
    </div>

    <details class="translation-settings">
      <summary>翻译设置</summary>

      <div class="settings-section">
        <div class="section-title">翻译表优先</div>
        <label for="tableFile">导入本地表</label>
        <input id="tableFile" type="file" accept=".csv,.tsv,.txt,.json,.xlsx,.xls">
        <div class="hint">支持 CSV / TSV / JSON / XLSX，第一行作为列名；.xls 请另存为 .xlsx。</div>

        <details class="sub-settings">
          <summary>网页表</summary>
          <label for="tableUrl">网页表 URL</label>
          <input id="tableUrl" type="text" placeholder="公开 CSV / JSON / HTML 表格地址">
          <div class="inline-actions">
            <button class="secondary" id="loadTableUrl" type="button">读取网页表</button>
            <button class="secondary" id="clearTable" type="button">清空表</button>
          </div>
        </details>

        <label class="check">
          <input id="fallbackMyMemory" type="checkbox">
          <span>表里缺失时使用翻译服务</span>
        </label>

        <div id="tableLanguages" class="language-list"></div>
        <div id="tableSummary" class="table-summary">未导入翻译表。</div>
      </div>

      <div class="settings-section">
        <div class="section-title">缺失文本兜底</div>
        <label for="provider">翻译服务</label>
        <select id="provider">
          <option value="mymemory">MyMemory 免注册免费翻译</option>
          <option value="custom">自定义 JSON 接口</option>
          <option value="none">不翻译，只做 RTL</option>
        </select>

        <div id="myMemoryFields" class="field">
          <label for="email">Email（可选）</label>
          <input id="email" type="text" placeholder="可不填；填写后可提高免费额度">
          <div class="hint">不需要注册和 Key。公共免费接口有额度限制。</div>
          <div class="inline-actions">
            <button class="secondary" id="saveTranslation" type="button">保存配置</button>
            <button class="secondary" id="resetTranslation" type="button">重新填写</button>
          </div>
        </div>

        <div id="customFields" class="field">
          <label for="customEndpoint">自定义接口 URL</label>
          <input id="customEndpoint" type="text" placeholder="例如：https://libretranslate.com/translate">
          <div class="hint">接口需兼容 JSON POST。</div>
          <div class="inline-actions">
            <button class="secondary" id="saveCustomTranslation" type="button">保存配置</button>
            <button class="secondary" id="resetCustomTranslation" type="button">重新填写</button>
          </div>
        </div>
      </div>
    </details>

    <div class="actions">
      <button class="secondary" id="close">关闭</button>
      <button class="primary" id="mirrorRun" disabled>一键镜像</button>
      <button class="primary" id="translateRun" disabled>一键翻译</button>
    </div>
    <div id="status" class="status"></div>

    <script>
      const customEndpoint = document.getElementById('customEndpoint');
      const email = document.getElementById('email');
      const provider = document.getElementById('provider');
      const targetLanguage = document.getElementById('targetLanguage');
      const customTargetLanguage = document.getElementById('customTargetLanguage');
      const customLanguageField = document.getElementById('customLanguageField');
      const tableFile = document.getElementById('tableFile');
      const tableUrl = document.getElementById('tableUrl');
      const loadTableUrl = document.getElementById('loadTableUrl');
      const clearTable = document.getElementById('clearTable');
      const fallbackMyMemory = document.getElementById('fallbackMyMemory');
      const tableLanguages = document.getElementById('tableLanguages');
      const tableSummary = document.getElementById('tableSummary');
      const createCopy = document.getElementById('createCopy');
      const translate = document.getElementById('translate');
      const mirrorRun = document.getElementById('mirrorRun');
      const translateRun = document.getElementById('translateRun');
      const close = document.getElementById('close');
      const saveTranslation = document.getElementById('saveTranslation');
      const resetTranslation = document.getElementById('resetTranslation');
      const saveCustomTranslation = document.getElementById('saveCustomTranslation');
      const resetCustomTranslation = document.getElementById('resetCustomTranslation');
      const status = document.getElementById('status');
      const myMemoryFields = document.getElementById('myMemoryFields');
      const customFields = document.getElementById('customFields');
      const selectionCount = document.getElementById('selectionCount');
      const selectionList = document.getElementById('selectionList');
      let selectedFrameCount = 0;
      let isConverting = false;
      let translationRows = [];
      let translationColumns = [];
      let sourceColumn = '';

      parent.postMessage({ pluginMessage: { type: 'load-settings' } }, '*');

      onmessage = (event) => {
        const message = event.data.pluginMessage || {};
        if (message.type === 'settings') {
          provider.value = normalizeProvider(message.settings.provider);
          customEndpoint.value = message.settings.endpoint || '';
          email.value = message.settings.email || '';
          setTargetLanguage(message.settings.targetLanguage);
          syncFields();
        }
        if (message.type === 'done') {
          isConverting = false;
          updateRunState();
          status.textContent = message.ok ? (message.summary || '完成') : ('转换失败：' + (message.detail || message.error || '未知错误'));
        }
        if (message.type === 'selection') {
          renderSelection(message.items || []);
        }
        if (message.type === 'settings-saved') {
          saveTranslation.disabled = false;
          saveCustomTranslation.disabled = false;
          status.textContent = message.ok ? '翻译配置已保存' : '保存失败';
        }
        if (message.type === 'settings-reset') {
          resetTranslation.disabled = false;
          resetCustomTranslation.disabled = false;
          provider.value = 'mymemory';
          customEndpoint.value = '';
          email.value = '';
          targetLanguage.value = 'ar';
          customTargetLanguage.value = '';
          syncFields();
          status.textContent = message.ok ? '已清空，请重新填写翻译配置' : '清空失败';
        }
      };

      provider.onchange = syncFields;
      targetLanguage.onchange = function () {
        syncFields();
        updateTableSummary();
      };
      tableFile.onchange = loadLocalTable;
      loadTableUrl.onclick = loadRemoteTable;
      clearTable.onclick = clearTranslationTable;

      function syncFields() {
        const value = provider.value;
        myMemoryFields.className = value === 'mymemory' ? 'field show' : 'field';
        customFields.className = value === 'custom' ? 'field show' : 'field';
        customLanguageField.className = targetLanguage.value === 'custom' ? 'field show' : 'field';
      }

      function renderSelection(items) {
        selectedFrameCount = items.length;
        selectionCount.textContent = items.length + ' 个';
        mirrorRun.textContent = items.length > 1 ? '一键镜像 ' + items.length + ' 个对象' : '一键镜像';
        translateRun.textContent = items.length > 1 ? '一键翻译 ' + items.length + ' 个对象' : '一键翻译';
        updateRunState();

        if (!items.length) {
          selectionList.innerHTML = '<div class="selection-empty">还没有选中可转换画板或元素</div>';
          return;
        }

        selectionList.innerHTML = items.map(function (item) {
          return '<div class="selection-item">'
            + '<span class="selection-name" title="' + escapeHtml(item.name) + '">' + escapeHtml(item.name) + '</span>'
            + '<span class="selection-type">' + escapeHtml(item.type) + '</span>'
            + '</div>';
        }).join('');
      }

      function updateRunState() {
        mirrorRun.disabled = isConverting || selectedFrameCount === 0;
        translateRun.disabled = isConverting || selectedFrameCount === 0;
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function normalizeProvider(value) {
        if (value === 'custom' || value === 'none') return value;
        return 'mymemory';
      }

      function normalizeTargetLanguage(value) {
        return value || 'ar';
      }

      function getTargetLanguageCode() {
        if (targetLanguage.value === 'custom') {
          return customTargetLanguage.value.trim() || 'ar';
        }
        return targetLanguage.value || 'ar';
      }

      function setTargetLanguage(value) {
        const code = normalizeTargetLanguage(value);
        const option = Array.from(targetLanguage.options).find(function (item) {
          return item.value === code;
        });
        if (option) {
          targetLanguage.value = code;
          customTargetLanguage.value = '';
        } else {
          targetLanguage.value = 'custom';
          customTargetLanguage.value = code;
        }
      }

      saveTranslation.onclick = saveTranslationSettings;
      saveCustomTranslation.onclick = saveTranslationSettings;

      function saveTranslationSettings() {
        saveTranslation.disabled = true;
        saveCustomTranslation.disabled = true;
        status.textContent = '正在保存翻译配置...';
        parent.postMessage({
          pluginMessage: {
            type: 'save-translation-settings',
            settings: collectTranslationSettings()
          }
        }, '*');
      }

      resetTranslation.onclick = resetTranslationSettings;
      resetCustomTranslation.onclick = resetTranslationSettings;

      function resetTranslationSettings() {
        resetTranslation.disabled = true;
        resetCustomTranslation.disabled = true;
        status.textContent = '正在清空翻译配置...';
        parent.postMessage({
          pluginMessage: {
            type: 'reset-translation-settings'
          }
        }, '*');
      }

      function collectTranslationSettings() {
        const selectedProvider = provider.value;
        const tableData = buildTranslationTable();
        const targetColumn = getTableTargetColumn();
        return {
          provider: selectedProvider,
          endpoint: selectedProvider === 'custom' ? customEndpoint.value : '',
          apiKey: '',
          region: '',
          email: selectedProvider === 'mymemory' ? email.value : '',
          targetLanguage: getTargetLanguageCode(),
          tableImported: translationRows.length > 0,
          tableTargetMissing: translationRows.length > 0 && !targetColumn,
          useTranslationTable: !!tableData,
          translationTable: tableData || {},
          fallbackMissingWithMyMemory: fallbackMyMemory.checked
        };
      }

      function buildTranslationTable() {
        const targetColumn = getTableTargetColumn();
        if (!translationRows.length || !sourceColumn || !targetColumn) return null;
        const map = {};
        for (const row of translationRows) {
          const source = normalizeCell(row[sourceColumn]);
          const target = normalizeCell(row[targetColumn]);
          if (source && target) map[source] = target;
        }
        return Object.keys(map).length ? map : null;
      }

      function normalizeCell(value) {
        return String(value === undefined || value === null ? '' : value).trim();
      }

      async function loadLocalTable() {
        const file = tableFile.files && tableFile.files[0];
        if (!file) return;
        try {
          const rows = /\.xlsx$/i.test(file.name)
            ? await parseXlsxFile(file)
            : parseTableText(await file.text(), file.name);
          applyTableRows(rows);
          status.textContent = '翻译表已导入';
        } catch (error) {
          status.textContent = '翻译表导入失败：' + error.message;
        }
      }

      async function loadRemoteTable() {
        const url = tableUrl.value.trim();
        if (!url) {
          status.textContent = '请先填写网页表 URL';
          return;
        }
        loadTableUrl.disabled = true;
        status.textContent = '正在读取网页表...';
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('网页返回 ' + response.status);
          const text = await response.text();
          applyTableRows(parseTableText(text, url));
          status.textContent = '网页表已导入';
        } catch (error) {
          status.textContent = '读取网页表失败：可能被 Figma 网络白名单或网页跨域限制。' + error.message;
        } finally {
          loadTableUrl.disabled = false;
        }
      }

      function parseTableText(text, name) {
        const trimmed = String(text || '').trim();
        if (!trimmed) throw new Error('表为空');
        if (/\.json($|\?)/i.test(name) || trimmed[0] === '[' || trimmed[0] === '{') {
          return parseJsonTable(trimmed);
        }
        if (/<table[\s>]/i.test(trimmed)) {
          return parseHtmlTable(trimmed);
        }
        const delimiter = trimmed.indexOf('\t') >= 0 ? '\t' : ',';
        return parseDelimitedTable(trimmed, delimiter);
      }

      function parseJsonTable(text) {
        const data = JSON.parse(text);
        if (Array.isArray(data)) return data.map(function (row) { return Object.assign({}, row); });
        if (Array.isArray(data.rows)) return data.rows.map(function (row) { return Object.assign({}, row); });
        if (data && typeof data === 'object') {
          return Object.keys(data).map(function (key) {
            const value = data[key];
            if (value && typeof value === 'object' && !Array.isArray(value)) {
              return Object.assign({ 中文: key }, value);
            }
            return { 中文: key, Translation: value };
          });
        }
        throw new Error('JSON 需要是数组，或包含 rows 数组');
      }

      function parseHtmlTable(text) {
        const doc = new DOMParser().parseFromString(text, 'text/html');
        const table = doc.querySelector('table');
        if (!table) throw new Error('没有找到 table');
        const rows = Array.from(table.querySelectorAll('tr')).map(function (tr) {
          return Array.from(tr.children).map(function (cell) {
            return cell.textContent.trim();
          });
        }).filter(function (row) { return row.length; });
        return rowsToObjects(rows);
      }

      function parseDelimitedTable(text, delimiter) {
        return rowsToObjects(parseDelimitedRows(text, delimiter));
      }

      async function parseXlsxFile(file) {
        if (/\.xls$/i.test(file.name)) {
          throw new Error('暂不支持 .xls，请另存为 .xlsx 或 CSV UTF-8');
        }
        const files = await unzipXlsx(await file.arrayBuffer());
        const workbookXml = textFromZip(files, 'xl/workbook.xml');
        const relsXml = textFromZip(files, 'xl/_rels/workbook.xml.rels');
        const sheetPath = getFirstWorksheetPath(workbookXml, relsXml);
        const sheetXml = textFromZip(files, sheetPath);
        const sharedStrings = parseSharedStrings(files);
        return rowsToObjects(parseWorksheetRows(sheetXml, sharedStrings));
      }

      async function unzipXlsx(buffer) {
        const view = new DataView(buffer);
        const bytes = new Uint8Array(buffer);
        const eocdOffset = findEndOfCentralDirectory(bytes);
        if (eocdOffset < 0) throw new Error('不是有效的 .xlsx 文件');

        const entryCount = view.getUint16(eocdOffset + 10, true);
        const centralOffset = view.getUint32(eocdOffset + 16, true);
        const result = {};
        let offset = centralOffset;
        for (let i = 0; i < entryCount; i += 1) {
          if (view.getUint32(offset, true) !== 0x02014b50) throw new Error('Excel 压缩目录损坏');
          const method = view.getUint16(offset + 10, true);
          const compressedSize = view.getUint32(offset + 20, true);
          const fileNameLength = view.getUint16(offset + 28, true);
          const extraLength = view.getUint16(offset + 30, true);
          const commentLength = view.getUint16(offset + 32, true);
          const localOffset = view.getUint32(offset + 42, true);
          const name = decodeUtf8(bytes.slice(offset + 46, offset + 46 + fileNameLength));
          result[name] = await readZipEntry(buffer, localOffset, method, compressedSize);
          offset += 46 + fileNameLength + extraLength + commentLength;
        }
        return result;
      }

      function findEndOfCentralDirectory(bytes) {
        for (let i = bytes.length - 22; i >= 0 && i >= bytes.length - 65558; i -= 1) {
          if (bytes[i] === 0x50 && bytes[i + 1] === 0x4b && bytes[i + 2] === 0x05 && bytes[i + 3] === 0x06) {
            return i;
          }
        }
        return -1;
      }

      async function readZipEntry(buffer, localOffset, method, compressedSize) {
        const view = new DataView(buffer);
        const bytes = new Uint8Array(buffer);
        if (view.getUint32(localOffset, true) !== 0x04034b50) throw new Error('Excel 压缩内容损坏');
        const fileNameLength = view.getUint16(localOffset + 26, true);
        const extraLength = view.getUint16(localOffset + 28, true);
        const dataStart = localOffset + 30 + fileNameLength + extraLength;
        const compressed = bytes.slice(dataStart, dataStart + compressedSize);
        if (method === 0) return compressed;
        if (method !== 8) throw new Error('Excel 使用了暂不支持的压缩方式');
        if (!('DecompressionStream' in window)) throw new Error('当前 Figma 环境不支持解压 XLSX，请另存为 CSV');
        const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
        return new Uint8Array(await new Response(stream).arrayBuffer());
      }

      function textFromZip(files, path) {
        const bytes = files[path];
        if (!bytes) throw new Error('Excel 缺少 ' + path);
        return decodeUtf8(bytes);
      }

      function decodeUtf8(bytes) {
        return new TextDecoder('utf-8').decode(bytes);
      }

      function getFirstWorksheetPath(workbookXml, relsXml) {
        const workbook = parseXml(workbookXml);
        const rels = parseXml(relsXml);
        const firstSheet = workbook.querySelector('sheet');
        if (!firstSheet) throw new Error('Excel 没有工作表');
        const relId = firstSheet.getAttribute('r:id');
        const rel = Array.from(rels.querySelectorAll('Relationship')).find(function (item) {
          return item.getAttribute('Id') === relId;
        });
        if (!rel) throw new Error('Excel 工作表关系缺失');
        const target = rel.getAttribute('Target') || '';
        return target.indexOf('xl/') === 0 ? target : 'xl/' + target.replace(/^\//, '');
      }

      function parseSharedStrings(files) {
        if (!files['xl/sharedStrings.xml']) return [];
        const doc = parseXml(decodeUtf8(files['xl/sharedStrings.xml']));
        return Array.from(doc.querySelectorAll('si')).map(function (item) {
          return Array.from(item.querySelectorAll('t')).map(function (text) {
            return text.textContent || '';
          }).join('');
        });
      }

      function parseWorksheetRows(sheetXml, sharedStrings) {
        const doc = parseXml(sheetXml);
        const rows = [];
        Array.from(doc.querySelectorAll('sheetData row')).forEach(function (rowNode) {
          const row = [];
          Array.from(rowNode.querySelectorAll('c')).forEach(function (cell) {
            const index = columnIndexFromRef(cell.getAttribute('r') || '');
            row[index] = readCellValue(cell, sharedStrings);
          });
          rows.push(row.map(function (value) { return value || ''; }));
        });
        return rows.filter(function (row) {
          return row.some(function (cell) { return normalizeCell(cell); });
        });
      }

      function readCellValue(cell, sharedStrings) {
        const type = cell.getAttribute('t');
        if (type === 'inlineStr') {
          return Array.from(cell.querySelectorAll('is t')).map(function (item) {
            return item.textContent || '';
          }).join('');
        }
        const value = cell.querySelector('v');
        if (!value) return '';
        const text = value.textContent || '';
        if (type === 's') return sharedStrings[Number(text)] || '';
        return text;
      }

      function columnIndexFromRef(ref) {
        const letters = String(ref || '').match(/[A-Z]+/i);
        if (!letters) return 0;
        let index = 0;
        const text = letters[0].toUpperCase();
        for (let i = 0; i < text.length; i += 1) {
          index = index * 26 + text.charCodeAt(i) - 64;
        }
        return index - 1;
      }

      function parseXml(text) {
        const doc = new DOMParser().parseFromString(text, 'application/xml');
        if (doc.querySelector('parsererror')) throw new Error('Excel XML 解析失败');
        return doc;
      }

      function parseDelimitedRows(text, delimiter) {
        const rows = [];
        let row = [];
        let cell = '';
        let quoted = false;
        for (let i = 0; i < text.length; i += 1) {
          const ch = text[i];
          const next = text[i + 1];
          if (ch === '"') {
            if (quoted && next === '"') {
              cell += '"';
              i += 1;
            } else {
              quoted = !quoted;
            }
            continue;
          }
          if (!quoted && ch === delimiter) {
            row.push(cell);
            cell = '';
            continue;
          }
          if (!quoted && (ch === '\n' || ch === '\r')) {
            if (ch === '\r' && next === '\n') i += 1;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
            continue;
          }
          cell += ch;
        }
        row.push(cell);
        rows.push(row);
        return rows.filter(function (items) {
          return items.some(function (item) { return normalizeCell(item); });
        });
      }

      function rowsToObjects(rows) {
        if (!rows.length) throw new Error('表为空');
        const headers = rows[0].map(function (header, index) {
          return normalizeCell(header) || ('列 ' + (index + 1));
        });
        return rows.slice(1).map(function (items) {
          const row = {};
          for (let i = 0; i < headers.length; i += 1) row[headers[i]] = items[i] || '';
          return row;
        }).filter(function (row) {
          return headers.some(function (header) { return normalizeCell(row[header]); });
        });
      }

      function applyTableRows(rows) {
        if (!rows.length) throw new Error('没有可用数据行');
        translationRows = rows;
        translationColumns = collectColumns(rows);
        sourceColumn = detectSourceColumn(translationColumns, rows);
        renderTableTarget();
      }

      function collectColumns(rows) {
        const columns = [];
        const seen = {};
        for (const row of rows) {
          for (const key in row) {
            if (!seen[key]) {
              seen[key] = true;
              columns.push(key);
            }
          }
        }
        return columns;
      }

      function detectSourceColumn(columns, rows) {
        const named = columns.find(function (column) {
          return /中文|简体|zh|chinese|source|原文/i.test(column);
        });
        if (named) return named;
        return columns.find(function (column) {
          return rows.some(function (row) { return /[\u3400-\u9fff]/.test(normalizeCell(row[column])); });
        }) || columns[0] || '';
      }

      function renderTableTarget() {
        updateTableSummary();
      }

      function getTableTargetColumn() {
        const targetCode = getTargetLanguageCode();
        return translationColumns.find(function (column) {
          return column !== sourceColumn && detectLanguageCodeFromColumn(column) === targetCode;
        }) || '';
      }

      function detectLanguageCodeFromColumn(column) {
        const value = String(column || '').trim().toLowerCase();
        const checks = [
          [/阿拉伯|阿语|arabic|العربية|^ar$/, 'ar'],
          [/英语|英文|english|^en$/, 'en'],
          [/葡萄牙|portuguese|português|^pt$/, 'pt'],
          [/西班牙|spanish|español|^es$/, 'es'],
          [/缅甸|burmese|myanmar|^my$/, 'my'],
          [/日语|日文|japanese|日本語|^ja$/, 'ja'],
          [/韩语|韩文|korean|한국어|^ko$/, 'ko'],
          [/法语|法文|french|français|^fr$/, 'fr'],
          [/德语|德文|german|deutsch|^de$/, 'de'],
          [/意大利|italian|italiano|^it$/, 'it'],
          [/俄语|俄文|russian|русский|^ru$/, 'ru'],
          [/泰语|thai|ไทย|^th$/, 'th'],
          [/越南|vietnamese|tiếng việt|^vi$/, 'vi'],
          [/印尼|indonesian|bahasa indonesia|^id$/, 'id'],
          [/马来|malay|bahasa melayu|^ms$/, 'ms'],
          [/印地|hindi|हिन्दी|^hi$/, 'hi'],
          [/土耳其|turkish|türkçe|^tr$/, 'tr']
        ];
        for (const item of checks) {
          if (item[0].test(value)) return item[1];
        }
        return '';
      }

      function updateTableSummary() {
        renderTableLanguages();
        const tableData = buildTranslationTable();
        const count = tableData ? Object.keys(tableData).length : 0;
        if (!translationRows.length) {
          tableSummary.textContent = '未导入翻译表。';
          return;
        }
        const targetColumn = getTableTargetColumn();
        if (!targetColumn) {
          tableSummary.textContent = '已导入 ' + translationRows.length + ' 行；源语言列：'
            + (sourceColumn || '未识别') + '；未识别到当前目标语言对应的翻译表列。';
          return;
        }
        tableSummary.textContent = '已导入 ' + translationRows.length + ' 行；源语言列：'
          + (sourceColumn || '未识别') + '；目标语言列：'
          + targetColumn + '；可匹配 ' + count + ' 条。';
      }

      function renderTableLanguages() {
        if (!translationColumns.length) {
          tableLanguages.innerHTML = '';
          return;
        }
        tableLanguages.innerHTML = translationColumns.map(function (column) {
          const code = column === sourceColumn ? 'zh-CN' : detectLanguageCodeFromColumn(column);
          const label = code ? getLanguageLabel(code) : ('未识别：' + column);
          const className = code ? 'language-pill' : 'language-pill muted';
          return '<span class="' + className + '" title="' + escapeHtml(column) + '">'
            + escapeHtml(label)
            + '</span>';
        }).join('');
      }

      function getLanguageLabel(code) {
        const labels = {
          'zh-CN': '中文',
          ar: '阿拉伯语',
          en: '英语',
          pt: '葡萄牙语',
          es: '西班牙语',
          my: '缅甸语',
          ja: '日语',
          ko: '韩语',
          fr: '法语',
          de: '德语',
          it: '意大利语',
          ru: '俄语',
          tr: '土耳其语',
          th: '泰语',
          vi: '越南语',
          id: '印尼语',
          ms: '马来语',
          hi: '印地语',
          bn: '孟加拉语',
          ur: '乌尔都语',
          fa: '波斯语',
          he: '希伯来语',
          nl: '荷兰语',
          pl: '波兰语',
          uk: '乌克兰语',
          ro: '罗马尼亚语',
          cs: '捷克语',
          el: '希腊语',
          sv: '瑞典语',
          da: '丹麦语',
          fi: '芬兰语',
          no: '挪威语',
          hu: '匈牙利语',
          bg: '保加利亚语',
          hr: '克罗地亚语',
          sk: '斯洛伐克语',
          sl: '斯洛文尼亚语',
          lt: '立陶宛语',
          lv: '拉脱维亚语',
          et: '爱沙尼亚语',
          sw: '斯瓦希里语',
          tl: '菲律宾语'
        };
        return labels[code] || code;
      }

      function clearTranslationTable() {
        translationRows = [];
        translationColumns = [];
        sourceColumn = '';
        tableFile.value = '';
        tableUrl.value = '';
        updateTableSummary();
        status.textContent = '翻译表已清空';
      }

      mirrorRun.onclick = () => {
        isConverting = true;
        updateRunState();
        status.textContent = '正在镜像...';
        const selectedProvider = translate.checked ? provider.value : 'none';
        const translationSettings = collectTranslationSettings();
        if (translate.checked && translationSettings.tableTargetMissing) {
          isConverting = false;
          updateRunState();
          status.textContent = '翻译表里未识别到当前目标语言，已停止翻译。请更换目标语言或上传包含该语言的表。';
          return;
        }
        parent.postMessage({
          pluginMessage: {
            type: 'convert',
            settings: {
              mode: 'mirror',
              mirror: true,
              createCopy: createCopy.checked,
              translate: translate.checked,
              provider: selectedProvider,
              endpoint: translationSettings.endpoint,
              apiKey: '',
              region: '',
              email: selectedProvider === 'mymemory' ? translationSettings.email : '',
              targetLanguage: translationSettings.targetLanguage,
              tableImported: translate.checked && translationSettings.tableImported,
              tableTargetMissing: translate.checked && translationSettings.tableTargetMissing,
              useTranslationTable: translate.checked && translationSettings.useTranslationTable,
              translationTable: translate.checked ? translationSettings.translationTable : {},
              fallbackMissingWithMyMemory: translate.checked && translationSettings.fallbackMissingWithMyMemory
            }
          }
        }, '*');
      };

      translateRun.onclick = () => {
        isConverting = true;
        updateRunState();
        status.textContent = '正在翻译...';
        const selectedProvider = provider.value === 'none' ? 'mymemory' : provider.value;
        const translationSettings = collectTranslationSettings();
        if (translationSettings.tableTargetMissing) {
          isConverting = false;
          updateRunState();
          status.textContent = '翻译表里未识别到当前目标语言，已停止翻译。请更换目标语言或上传包含该语言的表。';
          return;
        }
        parent.postMessage({
          pluginMessage: {
            type: 'convert',
            settings: {
              mode: 'translate-only',
              mirror: false,
              createCopy: createCopy.checked,
              translate: true,
              provider: selectedProvider,
              endpoint: selectedProvider === 'custom' ? customEndpoint.value : '',
              apiKey: '',
              region: '',
              email: selectedProvider === 'mymemory' ? email.value : '',
              targetLanguage: getTargetLanguageCode(),
              tableImported: translationSettings.tableImported,
              tableTargetMissing: translationSettings.tableTargetMissing,
              useTranslationTable: translationSettings.useTranslationTable,
              translationTable: translationSettings.translationTable,
              fallbackMissingWithMyMemory: translationSettings.fallbackMissingWithMyMemory
            }
          }
        }, '*');
      };

      close.onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
      };
    </script>
  </body>
</html>
